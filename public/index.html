
<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI 디자인 사전 검수 에이전트</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b0d;--bg2:#111115;--bg3:#17171c;--bg4:#1e1e25;
  --border:#2a2a32;--border2:#38383f;
  --text:#f0f0f2;--text2:#9898a6;--text3:#5a5a68;
  --green:#12c48b;--green-bg:rgba(18,196,139,.1);--green-border:rgba(18,196,139,.2);
  --red:#ff5c5c;--red-bg:rgba(255,92,92,.1);--red-border:rgba(255,92,92,.2);
  --yellow:#ffb344;--yellow-bg:rgba(255,179,68,.1);--yellow-border:rgba(255,179,68,.2);
  --blue:#5b9cf6;--blue-bg:rgba(91,156,246,.1);--blue-border:rgba(91,156,246,.2);
  --r:12px;--r2:8px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
header{height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:10px;background:var(--bg2);position:sticky;top:0;z-index:100}
.logo{width:26px;height:26px;border-radius:7px;background:var(--green);display:grid;place-items:center;font-size:13px;flex-shrink:0}
header strong{font-size:14px;font-weight:600}
.badge{font-size:10px;padding:3px 8px;border:1px solid var(--green-border);color:var(--green);border-radius:99px;letter-spacing:.04em}

/* Layout */
.app-body{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - 54px)}
@media(max-width:900px){.app-body{grid-template-columns:1fr}}

/* Left sidebar */
.sidebar{border-right:1px solid var(--border);background:var(--bg2);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:5px}
input,select,textarea{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:var(--r2);color:var(--text);padding:10px 12px;font-size:13px;font-family:inherit;outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
input::placeholder,textarea::placeholder{color:var(--text3)}
textarea{min-height:60px;resize:vertical}
select option{background:var(--bg4)}

/* Director cards */
.director-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.director-card{border:1.5px solid var(--border);border-radius:var(--r2);padding:10px 8px;cursor:pointer;text-align:center;transition:all .15s;background:var(--bg4)}
.director-card.selected{border-color:var(--green);background:var(--green-bg)}
.director-card.selected .dir-letter{color:var(--green)}
.dir-letter{font-size:18px;font-weight:800;margin-bottom:3px;color:var(--text2)}
.dir-name{font-size:11px;font-weight:600}
.dir-desc{font-size:9px;color:var(--text3);margin-top:2px;line-height:1.3}

/* Upload */
.upload{border:1.5px dashed var(--border2);border-radius:var(--r);min-height:100px;display:grid;place-items:center;text-align:center;color:var(--text3);cursor:pointer;background:var(--bg4);transition:all .15s;overflow:hidden}
.upload:hover{border-color:var(--green);background:var(--green-bg)}
.upload img{max-width:100%;max-height:130px;border-radius:var(--r2);display:block}
.upload-text{font-size:13px}
.upload-sub{font-size:11px;margin-top:3px}

/* Spec */
.spec{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.spec-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px}
.spec-row:last-child{border-bottom:none}
.spec-key{color:var(--text2)}
.ok{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--yellow)}

.run-btn{width:100%;padding:12px;background:var(--green);border:none;border-radius:var(--r);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.run-btn:hover:not(:disabled){background:#0faa78;transform:translateY(-1px)}
.run-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Right: canvas area */
.canvas-area{display:flex;flex-direction:column;overflow:hidden}

/* Top: verdict + image with markers */
.top-pane{display:grid;grid-template-columns:1fr 320px;min-height:0;border-bottom:1px solid var(--border)}

/* Image canvas */
.image-canvas{position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:300px}
.canvas-img{display:block;max-width:100%;max-height:500px;object-fit:contain;user-select:none}
.canvas-empty{color:var(--text3);font-size:13px;text-align:center;padding:2rem}
.canvas-loading{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--text3)}
.spinner{width:32px;height:32px;border:2.5px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .9s linear infinite}

/* Markers */
.marker-layer{position:absolute;inset:0;pointer-events:none}
.marker{position:absolute;transform:translate(-50%,-50%);pointer-events:all;cursor:pointer;z-index:10}
.marker-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;border:2.5px solid rgba(255,255,255,.4);transition:transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.marker:hover .marker-dot{transform:scale(1.2)}
.marker.active .marker-dot{transform:scale(1.2);box-shadow:0 0 0 4px rgba(255,255,255,.2),0 2px 8px rgba(0,0,0,.5)}
.marker-critical .marker-dot{background:var(--red)}
.marker-warning .marker-dot{background:var(--yellow)}
.marker-info .marker-dot{background:var(--blue)}
.marker-pulse{position:absolute;inset:-4px;border-radius:50%;animation:pulse 2s infinite}
.marker-critical .marker-pulse{background:rgba(255,92,92,.3)}
.marker-warning .marker-pulse{background:rgba(255,179,68,.3)}
.marker-info .marker-pulse{background:rgba(91,156,246,.3)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0;transform:scale(1.8)}}

/* Comment panel (right of image) */
.comment-panel{border-left:1px solid var(--border);background:var(--bg2);overflow-y:auto;display:flex;flex-direction:column}
.comment-panel-head{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.04em;flex-shrink:0}
.comment-list{padding:12px;display:flex;flex-direction:column;gap:8px;flex:1}
.comment-item{border-radius:var(--r2);padding:12px;cursor:pointer;border:1.5px solid var(--border);background:var(--bg3);transition:all .15s}
.comment-item:hover{border-color:var(--border2)}
.comment-item.active{border-color:var(--green);background:var(--bg4)}
.comment-item.active-critical{border-color:var(--red)!important}
.comment-item.active-warning{border-color:var(--yellow)!important}
.comment-item.active-info{border-color:var(--blue)!important}
.comment-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.comment-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.cn-critical{background:var(--red)}
.cn-warning{background:var(--yellow)}
.cn-info{background:var(--blue)}
.comment-label{font-size:12px;font-weight:600;flex:1}
.comment-text{font-size:12px;color:var(--text2);line-height:1.6}
.comment-empty{padding:2rem;text-align:center;color:var(--text3);font-size:13px}

/* Bottom: sections */
.bottom-pane{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;max-height:420px}

/* Verdict banner */
.verdict-banner{border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;border:1px solid transparent}
.verdict-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.verdict-info{flex:1}
.verdict-label{font-size:11px;opacity:.7;margin-bottom:2px}
.verdict-value{font-size:16px;font-weight:800}
.verdict-dir{font-size:11px;opacity:.6;margin-top:1px}
.verdict-danger{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.verdict-danger .verdict-dot{background:var(--red)}
.verdict-warn{background:var(--yellow-bg);border-color:var(--yellow-border);color:var(--yellow)}
.verdict-warn .verdict-dot{background:var(--yellow)}
.verdict-caution{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue)}
.verdict-caution .verdict-dot{background:var(--blue)}
.verdict-ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.verdict-ok .verdict-dot{background:var(--green)}

/* Summary */
.summary-list{display:flex;flex-direction:column;gap:5px}
.summary-item{background:var(--bg4);border:1px solid var(--border);border-radius:var(--r2);padding:9px 12px;font-size:12px;color:var(--text2);display:flex;gap:8px}
.summary-bullet{color:var(--yellow);flex-shrink:0;font-size:10px;margin-top:2px}

/* Section cards */
.sections-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.section-card{background:var(--bg4);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;transition:background .12s}
.section-head:hover{background:rgba(255,255,255,.02)}
.section-head-left{display:flex;align-items:center;gap:8px}
.section-icon{font-size:14px}
.section-title{font-size:12px;font-weight:600}
.section-cause{font-size:10px;color:var(--text3);margin-top:1px}
.section-verdict{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;flex-shrink:0}
.sv-danger{background:var(--red-bg);color:var(--red)}
.sv-warn{background:var(--yellow-bg);color:var(--yellow)}
.sv-caution{background:var(--blue-bg);color:var(--blue)}
.sv-ok{background:var(--green-bg);color:var(--green)}
.section-toggle{color:var(--text3);font-size:11px;margin-left:6px;transition:transform .2s;display:inline-block}
.section-toggle.open{transform:rotate(180deg)}
.section-body{border-top:1px solid var(--border);padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.section-body.collapsed{display:none}
.detail-row{display:flex;flex-direction:column;gap:2px}
.detail-label{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.detail-text{font-size:12px;color:var(--text2);line-height:1.5}
.suggestion-text{font-size:12px;color:var(--text);background:rgba(18,196,139,.06);border-left:2px solid var(--green);padding:7px 10px;border-radius:0 var(--r2) var(--r2) 0;line-height:1.5}
.marker-refs{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.marker-ref{font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer}
.mr-critical{background:var(--red)}
.mr-warning{background:var(--yellow)}
.mr-info{background:var(--blue)}

/* Priorities & final */
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.priorities,.final-comment{background:var(--bg4);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.block-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.priority-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
.priority-item:last-child{border-bottom:none}
.priority-num{font-size:9px;font-weight:800;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.pn-1{background:var(--red-bg);color:var(--red)}
.pn-2{background:var(--yellow-bg);color:var(--yellow)}
.pn-3{background:var(--blue-bg);color:var(--blue)}
.final-text{font-size:12px;color:var(--text2);line-height:1.6}

.result-actions{display:flex;gap:8px}
.action-btn{flex:1;padding:8px;font-size:12px;font-weight:600;border-radius:var(--r2);cursor:pointer;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);transition:all .12s}
.action-btn:hover{background:var(--bg3);color:var(--text)}

.empty-canvas{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--text3);padding:3rem;gap:10px}
.empty-icon{font-size:32px;opacity:.3}
.empty-title{font-size:14px;font-weight:500;color:var(--text2)}
.empty-desc{font-size:12px;line-height:1.7}
</style>
</head>
<body>
<header>
  <div class="logo">✦</div>
  <strong>AI 디자인 사전 검수 에이전트</strong>
  <span class="badge">v5</span>
</header>

<div class="app-body">
  <!-- Left sidebar -->
  <aside class="sidebar">
    <div>
      <label>디렉터 타입</label>
      <div class="director-grid">
        <div class="director-card selected" data-type="A" onclick="selectDirector('A')">
          <div class="dir-letter">A</div>
          <div class="dir-name">완성도</div>
          <div class="dir-desc">마감감·디테일</div>
        </div>
        <div class="director-card" data-type="B" onclick="selectDirector('B')">
          <div class="dir-letter">B</div>
          <div class="dir-name">브랜드</div>
          <div class="dir-desc">톤·무드</div>
        </div>
        <div class="director-card" data-type="C" onclick="selectDirector('C')">
          <div class="dir-letter">C</div>
          <div class="dir-name">구조</div>
          <div class="dir-desc">가독성·위계</div>
        </div>
      </div>
    </div>
    <div>
      <label>시안 이미지</label>
      <div class="upload" id="uploadBox">
        <div id="uploadPlaceholder"><div class="upload-text">클릭 또는 드래그</div><div class="upload-sub">PNG / JPG / WebP</div></div>
        <img id="sidePreview" style="display:none" alt="미리보기"/>
      </div>
      <input id="file" type="file" accept="image/png,image/jpeg,image/webp" style="display:none"/>
    </div>
    <div>
      <label>배너 종류</label>
      <select id="reviewType"><option value="">선택하세요</option></select>
    </div>
    <div><label>브랜드명</label><input id="brandName" placeholder="예: Galaxy S26, Volvo"/></div>
    <div><label>화면 목적</label><input id="purpose" placeholder="예: 혜택 안내"/></div>
    <div><label>주요 혜택</label><input id="benefit" placeholder="핵심 혜택 또는 메시지"/></div>
    <div><label>CTA</label><input id="cta" placeholder="예: 혜택 보러가기"/></div>
    <div><label>메모 <span style="text-transform:none;font-weight:400">(선택)</span></label><textarea id="memo" placeholder="의도한 부분, 우려되는 부분"></textarea></div>
    <div class="spec" id="specBox"><div class="spec-row"><span class="spec-key">상태</span><span class="warn">이미지와 유형을 선택하세요</span></div></div>
    <button class="run-btn" id="runBtn" disabled onclick="runReview()">✦ 검수 시작</button>
  </aside>

  <!-- Right canvas area -->
  <div class="canvas-area" id="canvasArea">
    <div class="empty-canvas" id="emptyCanvas">
      <div class="empty-icon">✦</div>
      <div class="empty-title">검수 대기 중</div>
      <div class="empty-desc">시안을 업로드하고<br>검수를 시작하면<br>이미지 위에 마커가 표시됩니다</div>
    </div>

    <div id="resultArea" style="display:none;flex-direction:column;flex:1">
      <!-- Top: image + comments -->
      <div class="top-pane">
        <div class="image-canvas" id="imageCanvas">
          <div class="canvas-loading" id="canvasLoading" style="display:none">
            <div class="spinner"></div>
            <div id="loadingMsg" style="font-size:13px;color:var(--text2)">검수 중...</div>
          </div>
          <img id="mainImg" class="canvas-img" style="display:none" alt="시안"/>
          <div class="marker-layer" id="markerLayer"></div>
        </div>
        <div class="comment-panel">
          <div class="comment-panel-head">📍 마커 코멘트</div>
          <div class="comment-list" id="commentList">
            <div class="comment-empty">검수 후 마커를 클릭하면<br>상세 코멘트가 표시됩니다</div>
          </div>
        </div>
      </div>

      <!-- Bottom: verdict + sections -->
      <div class="bottom-pane" id="bottomPane"></div>
    </div>
  </div>
</div>

<script>
let rules={},selectedFile=null,imageInfo=null,selectedDirector='A',lastResultText='',parsedResult=null,activeMarkerId=null;
const $=id=>document.getElementById(id);
const ICONS={tv:'📺',hierarchy:'📊',brand:'🎨',finish:'✨'};
const DIR_NAMES={A:'완성도 디렉터',B:'브랜드 디렉터',C:'구조 디렉터'};

async function init(){
  try{const r=await fetch('/rules/design-guide-rules.json');rules=await r.json();Object.keys(rules.items||{}).forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=k;$('reviewType').appendChild(o)});}catch(e){console.warn(e);}
}

function selectDirector(t){
  selectedDirector=t;
  document.querySelectorAll('.director-card').forEach(c=>c.classList.toggle('selected',c.dataset.type===t));
}

function fileToBase64(f){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(String(fr.result).split(',')[1]);fr.onerror=rej;fr.readAsDataURL(f);});}
function loadImageInfo(f){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>res({width:img.naturalWidth,height:img.naturalHeight});img.onerror=rej;img.src=URL.createObjectURL(f);});}

function checkSpec(){
  const type=$('reviewType').value,spec=rules.items?.[type];
  if(!selectedFile||!type||!spec){$('runBtn').disabled=true;return null;}
  const kb=Math.round(selectedFile.size/1024);
  const sizeOk=(spec.width===null||imageInfo.width===spec.width)&&imageInfo.height===spec.height;
  const formatOk=spec.formats.includes(selectedFile.type);
  const maxOk=kb<=spec.maxKB;
  const st=spec.width===null?`H ${spec.height}`:`${spec.width}×${spec.height}`;
  $('specBox').innerHTML=`<div class="spec-row"><span class="spec-key">사이즈</span><span class="${sizeOk?'ok':'bad'}">${imageInfo.width}×${imageInfo.height} / 기준 ${st}</span></div><div class="spec-row"><span class="spec-key">형식</span><span class="${formatOk?'ok':'bad'}">${selectedFile.type.replace('image/','').toUpperCase()}</span></div><div class="spec-row"><span class="spec-key">용량</span><span class="${maxOk?'ok':'bad'}">${kb}KB / ${spec.maxKB}KB 이하</span></div><div class="spec-row"><span class="spec-key">안전영역</span><span class="warn">${spec.safeArea}</span></div>`;
  $('runBtn').disabled=false;
  return{type,actual:{width:imageInfo.width,height:imageInfo.height,mime:selectedFile.type,kb},expected:spec,result:{sizeOk,formatOk,maxOk}};
}

async function handleFile(f){
  selectedFile=f;imageInfo=await loadImageInfo(f);
  const url=URL.createObjectURL(f);
  $('sidePreview').src=url;$('sidePreview').style.display='block';$('uploadPlaceholder').style.display='none';
  $('mainImg').src=url;
  checkSpec();
}

$('uploadBox').onclick=()=>$('file').click();
$('uploadBox').addEventListener('dragover',e=>{e.preventDefault();$('uploadBox').style.borderColor='var(--green)';});
$('uploadBox').addEventListener('dragleave',()=>{$('uploadBox').style.borderColor='';});
$('uploadBox').addEventListener('drop',e=>{e.preventDefault();$('uploadBox').style.borderColor='';const f=e.dataTransfer.files[0];if(f)handleFile(f);});
$('file').onchange=e=>{if(e.target.files[0])handleFile(e.target.files[0]);};
$('reviewType').onchange=checkSpec;

// Verdict helpers
function vc(v){if(!v)return'verdict-caution';if(v.includes('치명'))return'verdict-danger';if(v.includes('수정'))return'verdict-warn';if(v.includes('검토'))return'verdict-caution';if(v.includes('양호'))return'verdict-ok';return'verdict-caution';}
function svc(v){if(!v)return'sv-caution';if(v.includes('치명'))return'sv-danger';if(v.includes('수정'))return'sv-warn';if(v.includes('검토'))return'sv-caution';if(v.includes('양호'))return'sv-ok';return'sv-caution';}

// Render markers on image
function renderMarkers(markers){
  const layer=$('markerLayer');
  layer.innerHTML='';
  if(!markers||!markers.length)return;
  markers.forEach(m=>{
    const el=document.createElement('div');
    el.className=`marker marker-${m.severity}`;
    el.style.left=m.x+'%';
    el.style.top=m.y+'%';
    el.dataset.id=m.id;
    el.innerHTML=`<div class="marker-pulse"></div><div class="marker-dot">${m.id}</div>`;
    el.addEventListener('click',()=>activateMarker(m.id));
    layer.appendChild(el);
  });
}

// Render comment list
function renderComments(markers){
  const list=$('commentList');
  if(!markers||!markers.length){list.innerHTML='<div class="comment-empty">마커가 없습니다</div>';return;}
  list.innerHTML=markers.map(m=>`
    <div class="comment-item" id="ci-${m.id}" onclick="activateMarker(${m.id})">
      <div class="comment-header">
        <span class="comment-num cn-${m.severity}">${m.id}</span>
        <span class="comment-label">${m.label}</span>
      </div>
      <div class="comment-text">${m.comment}</div>
    </div>`).join('');
}

function activateMarker(id){
  activeMarkerId=id;
  // Update markers
  document.querySelectorAll('.marker').forEach(el=>{
    el.classList.toggle('active',Number(el.dataset.id)===id);
  });
  // Update comment items
  const m=parsedResult?.markers?.find(x=>x.id===id);
  document.querySelectorAll('.comment-item').forEach(el=>{
    el.classList.remove('active','active-critical','active-warning','active-info');
  });
  const ci=$('ci-'+id);
  if(ci){
    ci.classList.add('active');
    if(m)ci.classList.add('active-'+m.severity);
    ci.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

function toggleSection(id){
  const b=document.getElementById('body-'+id),t=document.getElementById('toggle-'+id);
  const open=!b.classList.contains('collapsed');
  b.classList.toggle('collapsed',open);t.classList.toggle('open',!open);
}

function renderBottom(p){
  const bp=$('bottomPane');
  const vcls=vc(p.verdict);
  const summary=(p.summary||[]).map(s=>`<div class="summary-item"><span class="summary-bullet">▸</span><span>${s}</span></div>`).join('');

  const sections=(p.sections||[]).map(s=>{
    const refs=(s.markerIds||[]).map(mid=>{
      const m=p.markers?.find(x=>x.id===mid);
      const cls=m?`mr-${m.severity}`:'mr-info';
      return `<span class="marker-ref ${cls}" onclick="activateMarker(${mid})">${mid}</span>`;
    }).join('');
    return `
    <div class="section-card">
      <div class="section-head" onclick="toggleSection('${s.id}')">
        <div class="section-head-left">
          <span class="section-icon">${ICONS[s.id]||'•'}</span>
          <div><div class="section-title">${s.title}</div>${s.cause?`<div class="section-cause">${s.cause}</div>`:''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <span class="section-verdict ${svc(s.verdict)}">${s.verdict}</span>
          <span class="section-toggle open" id="toggle-${s.id}">▾</span>
        </div>
      </div>
      <div class="section-body" id="body-${s.id}">
        ${refs?`<div class="marker-refs">${refs}</div>`:''}
        ${s.problem?`<div class="detail-row"><div class="detail-label">문제</div><div class="detail-text">${s.problem}</div></div>`:''}
        ${s.reason?`<div class="detail-row"><div class="detail-label">이유</div><div class="detail-text">${s.reason}</div></div>`:''}
        ${s.suggestion?`<div class="detail-row"><div class="detail-label">제안</div><div class="suggestion-text">${s.suggestion}</div></div>`:''}
      </div>
    </div>`;
  }).join('');

  const priorities=(p.priorities||[]).map((item,i)=>`<div class="priority-item"><span class="priority-num pn-${i+1}">${i+1}</span><span>${item}</span></div>`).join('');

  bp.innerHTML=`
    <div class="verdict-banner ${vcls}">
      <div class="verdict-dot"></div>
      <div class="verdict-info">
        <div class="verdict-label">종합 판정</div>
        <div class="verdict-value">${p.verdict||'—'}</div>
        <div class="verdict-dir">${DIR_NAMES[selectedDirector]||''} 기준</div>
      </div>
    </div>
    ${summary?`<div class="summary-list">${summary}</div>`:''}
    <div class="sections-grid">${sections}</div>
    <div class="bottom-row">
      ${priorities?`<div class="priorities"><div class="block-title">우선 수정 항목</div>${priorities}</div>`:'<div></div>'}
      ${p.finalComment?`<div class="final-comment"><div class="block-title">디렉터 전달 전 코멘트</div><div class="final-text">${p.finalComment}</div></div>`:'<div></div>'}
    </div>
    <div class="result-actions">
      <button class="action-btn" onclick="copyResult()">📋 결과 복사</button>
      <button class="action-btn" onclick="resetResult()">↺ 새 검수</button>
    </div>`;
}

async function runReview(){
  const specCheck=checkSpec();if(!specCheck)return;
  $('emptyCanvas').style.display='none';
  const ra=$('resultArea');ra.style.display='flex';
  $('mainImg').style.display='none';
  $('canvasLoading').style.display='flex';
  $('markerLayer').innerHTML='';
  $('commentList').innerHTML='<div class="comment-empty">검수 중...</div>';
  $('bottomPane').innerHTML='';
  $('runBtn').disabled=true;$('runBtn').innerHTML='<span class="btn-spinner"></span> 검수 중...';

  const MSGS=['이미지 분석 중...','규격 대조 중...','디렉터 기준 적용 중...','마커 생성 중...'];
  let mi=0;$('loadingMsg').textContent=MSGS[0];
  const timer=setInterval(()=>{mi=(mi+1)%MSGS.length;$('loadingMsg').textContent=MSGS[mi];},2500);

  try{
    const imageBase64=await fileToBase64(selectedFile);
    const payload={imageBase64,mimeType:selectedFile.type,reviewType:$('reviewType').value,brandName:$('brandName').value,purpose:$('purpose').value,benefit:$('benefit').value,cta:$('cta').value,memo:$('memo').value,specCheck,directorType:selectedDirector};
    const res=await fetch('/api/review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json();
    clearInterval(timer);
    if(!res.ok)throw new Error(data.error||'API 오류');
    lastResultText=data.text||'';

    // 클라이언트에서도 직접 파싱 시도
    if(data.parsed && data.parsed.verdict){
      parsedResult=data.parsed;
    } else {
      // 서버 파싱 실패시 클라이언트에서 재시도
      const raw=lastResultText;
      const attempts=[
        ()=>JSON.parse(raw),
        ()=>JSON.parse(raw.replace(/^```json\s*/,'').replace(/\s*```$/,'')),
        ()=>{const m=raw.match(/\{[\s\S]*\}/);return m?JSON.parse(m[0]):null;},
      ];
      for(const fn of attempts){
        try{const r=fn();if(r&&r.verdict){parsedResult=r;break;}}catch{}
      }
    }

    $('canvasLoading').style.display='none';
    $('mainImg').style.display='block';

    if(parsedResult){
      renderMarkers(parsedResult.markers||[]);
      renderComments(parsedResult.markers||[]);
      renderBottom(parsedResult);
    }else{
      $('bottomPane').innerHTML=`<pre style="white-space:pre-wrap;font-size:12px;line-height:1.7;color:var(--text2);padding:16px">${lastResultText}</pre>`;
    }
  }catch(e){
    clearInterval(timer);
    $('canvasLoading').style.display='none';
    $('bottomPane').innerHTML=`<div style="padding:16px;color:var(--red);font-size:13px">오류: ${e.message}</div>`;
  }finally{
    $('runBtn').disabled=false;$('runBtn').innerHTML='✦ 검수 시작';
  }
}

function copyResult(){
  navigator.clipboard.writeText(lastResultText).then(()=>{const b=event.target;b.textContent='✓ 복사됨';setTimeout(()=>b.textContent='📋 결과 복사',2000);});
}
function resetResult(){
  $('resultArea').style.display='none';
  $('emptyCanvas').style.display='flex';
  parsedResult=null;lastResultText='';activeMarkerId=null;
}
init();
</script>
</body>
</html>
